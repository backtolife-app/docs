name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [docs-update]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone app docs
        run: |
          git clone --depth 1 --branch main https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/backtolife-app/user-app.git /tmp/user-app
          cp -r /tmp/user-app/docs/. docs/app/

      - name: Clone parent docs
        run: |
          git clone --depth 1 --branch main https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/backtolife-app/parent-app.git /tmp/parent-app
          cp -r /tmp/parent-app/docs/. docs/parent/

      - name: Clone backend docs
        run: |
          git clone --depth 1 --branch main https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/backtolife-app/backend.git /tmp/backend
          cp -r /tmp/backend/docs/. docs/backend/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
