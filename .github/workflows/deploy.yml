name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow triggering a manual deploy from the Actions tab
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions needed to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel in-progress runs on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master docs repo
        uses: actions/checkout@v4
        with:
          # Full history so git-revision-date plugin works if added later
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: mkdocs build
        env:
          # Pass a GitHub token so the multirepo plugin can clone private repos
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
